name: bus-cd

on:
  push:
    branches: [main]
    paths:
      - infra/bus.yml
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: prod
        type: choice
        options: [prod, dev]

concurrency:
  group: bus-cd-${{ github.event.inputs.environment || 'prod' }}
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  ENV: ${{ github.event.inputs.environment || 'prod' }}

jobs:
  deploy:
    name: Deploy bus stack (${{ github.event.inputs.environment || 'prod' }})
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'prod' }}
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy bus stack
        run: |
          aws cloudformation deploy \
            --template-file infra/bus.yml \
            --stack-name parlaypal-bus-${{ env.ENV }} \
            --parameter-overrides \
                Environment=${{ env.ENV }} \
            --capabilities CAPABILITY_IAM \

      - name: Print stack outputs
        run: |
          aws cloudformation describe-stacks \
            --stack-name parlaypal-bus-${{ env.ENV }} \
            --query "Stacks[0].Outputs[*].{Key:OutputKey,Value:OutputValue}" \
            --output table
